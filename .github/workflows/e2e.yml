name: E2E Tests

on:
  # Scheduled trigger disabled — gastown is in maintenance freeze for cutover
  # to gas city. Re-add the cron line below to resume nightly runs.
  #   schedule:
  #     - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Manual triggering still available

jobs:
  e2e:
    name: E2E Tests (Container)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build test container
        run: docker build -f Dockerfile.e2e -t gastown-test .

      - name: Run E2E tests
        run: docker run --rm gastown-test
